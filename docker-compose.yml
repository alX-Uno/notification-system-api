services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_dev
    environment:
      SA_PASSWORD: "TuPassword123!" # Mínimo 8 chars, mayúscula, número y símbolo
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer" # Licencia gratuita para desarrollo
    ports:
      - "1433:1433" # Puerto local:puerto del contenedor
    volumes:
      - sqlserver_data:/var/opt/mssql # Persistencia de datos
    restart: unless-stopped

volumes:
  sqlserver_data:
